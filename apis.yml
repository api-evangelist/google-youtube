name: YouTube Data API
description: >-
  The YouTube Data API v3 lets you incorporate YouTube functionality into your
  own application. You can use the API to fetch search results, manage videos,
  playlists, channels, subscriptions, and access activity data. It supports
  reading and writing YouTube data using RESTful operations with OAuth 2.0
  authentication.
